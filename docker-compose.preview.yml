services:
  flask:
    build: .
    container_name: ba-flask-pr${PR_NUMBER}
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      SECRET_KEY: ${BA_SECRET_KEY}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${BA_DB_NAME}
      DB_USER: ${BA_DB_USER}
      DB_PASSWORD: ${BA_DB_PASSWORD}
    depends_on:
      - db
    networks:
      - internal
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mysql:9.1
    container_name: ba-mysql-pr${PR_NUMBER}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${BA_DB_PASSWORD}
      MYSQL_DATABASE: ${BA_DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
  app-network:
    name: app-network
    external: true
