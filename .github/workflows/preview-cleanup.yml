name: Destroy PR preview

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Destroy preview via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PR_NUMBER=${{ github.event.number }}
            DEPLOY_DIR="/home/oz-admin/ba-previews/pr${PR_NUMBER}"

            if [ -d "$DEPLOY_DIR" ]; then
              cd "$DEPLOY_DIR"
              docker compose -f docker-compose.preview.yml \
                -p "ba-pr${PR_NUMBER}" \
                down -v --remove-orphans
              rm -rf "$DEPLOY_DIR"
              echo "Контейнеры pr${PR_NUMBER} уничтожены"
            else
              echo "Папка $DEPLOY_DIR не найдена, пропускаем"
            fi

            # Удаляем nginx-маршрут и перезагружаем
            rm -f /home/oz-admin/nginx-previews/pr${PR_NUMBER}.conf
            docker exec nginx-proxy nginx -s reload
            echo "nginx-маршрут для pr${PR_NUMBER} удалён"
