name: Deploy PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy preview via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PR_NUMBER=${{ github.event.number }}
            PREVIEW_PORT=$((9000 + ${{ github.event.number }}))
            BRANCH="${{ github.head_ref }}"
            DEPLOY_DIR="/home/oz-admin/ba-previews/pr${PR_NUMBER}"

            # Клонируем ветку в отдельную папку
            if [ -d "$DEPLOY_DIR" ]; then
              cd "$DEPLOY_DIR" && git fetch && git checkout "$BRANCH" && git pull
            else
              git clone --branch "$BRANCH" https://github.com/KapKapkin/business-automation.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # Генерируем .env из секретов
            printf 'FLASK_ENV=development\nSECRET_KEY=%s\nDB_HOST=db\nDB_PORT=3306\nDB_NAME=%s\nDB_USER=%s\nDB_PASSWORD=%s\n' \
              "${{ secrets.BA_SECRET_KEY }}" \
              "${{ secrets.BA_DB_NAME }}_pr${PR_NUMBER}" \
              "${{ secrets.BA_DB_USER }}" \
              "${{ secrets.BA_DB_PASSWORD }}" > .env

            # Запускаем стенд
            PR_NUMBER=$PR_NUMBER PREVIEW_PORT=$PREVIEW_PORT \
            BA_SECRET_KEY="${{ secrets.BA_SECRET_KEY }}" \
            BA_DB_NAME="${{ secrets.BA_DB_NAME }}_pr${PR_NUMBER}" \
            BA_DB_USER="${{ secrets.BA_DB_USER }}" \
            BA_DB_PASSWORD="${{ secrets.BA_DB_PASSWORD }}" \
            docker compose -f docker-compose.preview.yml \
              -p "ba-pr${PR_NUMBER}" \
              up -d --build

            echo "Preview URL: http://${{ secrets.SERVER_HOST }}:${PREVIEW_PORT}/api/health"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const port = 9000 + ${{ github.event.number }};
            const url = `http://${{ secrets.SERVER_HOST }}:${port}`;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Preview environment\n\n🟢 Стенд развёрнут: [${url}](${url})\n\`GET ${url}/api/health\``
            });
