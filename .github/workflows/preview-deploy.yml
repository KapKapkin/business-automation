name: Deploy PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy preview via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            PR_NUMBER=${{ github.event.number }}
            BRANCH="${{ github.head_ref }}"
            DEPLOY_DIR="/home/oz-admin/ba-previews/pr${PR_NUMBER}"

            # –Ъ–ї–Њ–љ–Є—А—Г–µ–Љ –Є–ї–Є –Њ–±–љ–Њ–≤–ї—П–µ–Љ –≤–µ—В–Ї—Г
            if [ -d "$DEPLOY_DIR" ]; then
              cd "$DEPLOY_DIR" && git fetch && git checkout "$BRANCH" && git pull
            else
              git clone --branch "$BRANCH" https://github.com/KapKapkin/business-automation.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            # –У–µ–љ–µ—А–Є—А—Г–µ–Љ .env –Є–Ј —Б–µ–Ї—А–µ—В–Њ–≤
            printf 'FLASK_ENV=development\nSECRET_KEY=%s\nDB_HOST=db\nDB_PORT=3306\nDB_NAME=%s\nDB_USER=%s\nDB_PASSWORD=%s\n' \
              "${{ secrets.BA_SECRET_KEY }}" \
              "${{ secrets.BA_DB_NAME }}_pr${PR_NUMBER}" \
              "${{ secrets.BA_DB_USER }}" \
              "${{ secrets.BA_DB_PASSWORD }}" > .env

            # –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ —Б—В–µ–љ–і
            PR_NUMBER=$PR_NUMBER \
            BA_SECRET_KEY="${{ secrets.BA_SECRET_KEY }}" \
            BA_DB_NAME="${{ secrets.BA_DB_NAME }}_pr${PR_NUMBER}" \
            BA_DB_USER="${{ secrets.BA_DB_USER }}" \
            BA_DB_PASSWORD="${{ secrets.BA_DB_PASSWORD }}" \
            docker compose -f docker-compose.preview.yml \
              -p "ba-pr${PR_NUMBER}" \
              up -d --build

            # –†–µ–≥–Є—Б—В—А–Є—А—Г–µ–Љ –Љ–∞—А—И—А—Г—В –≤ nginx —З–µ—А–µ–Ј include-—Д–∞–є–ї
            mkdir -p /home/oz-admin/nginx-previews
            cat > /home/oz-admin/nginx-previews/pr${PR_NUMBER}.conf << NGINXEOF
        location /python/preview/pr${PR_NUMBER}/ {
            proxy_pass http://ba-flask-pr${PR_NUMBER}:5000/;
            proxy_http_version 1.1;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
NGINXEOF
            docker exec nginx-proxy nginx -s reload

            echo "Preview URL: http://${{ secrets.SERVER_HOST }}/python/preview/pr${PR_NUMBER}/api/health"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ github.event.number }};
            const base = `http://${{ secrets.SERVER_HOST }}/python/preview/pr${pr}`;
            const sha = `${{ github.event.pull_request.head.sha }}`.slice(0, 7);
            const branch = `${{ github.head_ref }}`;
            const actor = `${{ github.actor }}`;
            const commitUrl = `https://github.com/${{ github.repository }}/commit/${{ github.event.pull_request.head.sha }}`;

            const body = [
              `### Preview environment`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **–°—В–∞—В—Г—Б** | рЯЯҐ –Ч–∞–њ—Г—Й–µ–љ |`,
              `| **–Т–µ—В–Ї–∞** | \`${branch}\` |`,
              `| **–Ъ–Њ–Љ–Љ–Є—В** | [${sha}](${commitUrl}) |`,
              `| **–Р–≤—В–Њ—А** | @${actor} |`,
              `| **URL** | [${base}](${base}) |`,
              ``,
              `**–Я—А–Њ–≤–µ—А–Є—В—М:**`,
              `\`\`\``,
              `GET ${base}/api/health`,
              `\`\`\``,
            ].join('\n');

            // –Ш—Й–µ–Љ –њ—А–µ–і—Л–і—Г—Й–Є–є –Ї–Њ–Љ–Љ–µ–љ—В–∞—А–Є–є –±–Њ—В–∞ –Є –Њ–±–љ–Њ–≤–ї—П–µ–Љ –≤–Љ–µ—Б—В–Њ –љ–Њ–≤–Њ–≥–Њ
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const prev = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview environment'));
            if (prev) {
              github.rest.issues.updateComment({
                comment_id: prev.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              github.rest.issues.createComment({
                issue_number: pr,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
